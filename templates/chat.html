<!DOCTYPE html>
<html>
    <head>
        <title>CS50 Chat Bot</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
        <script src="{{ url_for('static', filename='chat_temp.js') }}" defer></script>
    </head>
    <body>
        <div class="container-fluid d-flex justify-content-center align-items-center vh-100 p-0">
            <div class="chat-container">
                <div class="chat-header text-center">💬 Live Chat</div>
                <!-- Messages -->
                <div class="chat-body" id="chatBody">
                    <div class="message bot">Hello! How can I help you?</div>
                </div>
                <!-- Input -->
                <div class="chat-footer">
                    <div class="input-group">
                        <input type="text" id="input" class="form-control" placeholder="Type something...">
                        <button class="btn btn-primary" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
